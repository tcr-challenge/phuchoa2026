name: 🔄 Cập nhật photos.json từ Google Drive

on:
  # ⏰ Tự động chạy mỗi 30 phút
  schedule:
    - cron: '*/30 * * * *'

  # 🖱️ Cho phép chạy thủ công từ GitHub UI (nút "Run workflow")
  workflow_dispatch:

jobs:
  update-photos:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # cần để push photos.json lên repo

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Cài thư viện
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: 🔑 Tạo token.json từ Secret
        # Lưu nội dung token.json vào GitHub Secret tên GDRIVE_TOKEN
        run: echo '${{ secrets.GDRIVE_TOKEN }}' > token.json

      - name: 🏃 Chạy script generate_index.py
        run: python generate_index.py

      - name: 📤 Commit & push photos.json nếu có thay đổi
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add photos.json
          # Chỉ commit khi có thay đổi thực sự
          git diff --staged --quiet || git commit -m "chore: cập nhật photos.json $(date +'%Y-%m-%d %H:%M') UTC"
          git push
