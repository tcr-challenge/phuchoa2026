<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marathon Photos — Tìm Ảnh Của Bạn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3d;
      --accent: #f7c948;
      --accent2: #ff6b35;
      --text: #f0f0f5;
      --muted: #7070a0;
      --success: #4ade80;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--accent);
      text-decoration: none;
    }
    .logo span { color: var(--accent2); }

    /* HERO */
    .hero {
      padding: 56px 24px 36px;
      text-align: center;
      position: relative;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(247,201,72,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 8vw, 84px);
      letter-spacing: 4px;
      line-height: 0.95;
      margin-bottom: 14px;
    }
    .hero h1 em { font-style: normal; color: var(--accent); }
    .hero p {
      color: var(--muted);
      font-size: 15px;
      max-width: 420px;
      margin: 0 auto 36px;
    }

    /* SEARCH TABS */
    .search-container {
      max-width: 640px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }
    .search-tabs {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .tab-btn {
      flex: 1;
      padding: 13px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .tab-btn.active { background: var(--accent); color: #0a0a0f; }
    .tab-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* BIB SEARCH */
    .bib-search { display: flex; gap: 10px; }
    .bib-input {
      flex: 1;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 5px;
      outline: none;
      transition: border-color 0.2s;
    }
    .bib-input::placeholder { color: var(--border); font-size: 22px; }
    .bib-input:focus { border-color: var(--accent); }
    .search-btn {
      padding: 16px 28px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: var(--radius);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .search-btn:hover { background: #ffe080; transform: translateY(-1px); }
    .search-btn:active { transform: translateY(0); }

    /* FACE PANEL */
    #face-search-panel { display: none; }
    .face-upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 44px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface);
      position: relative;
    }
    .face-upload-area:hover, .face-upload-area.dragover {
      border-color: var(--accent);
      background: rgba(247,201,72,0.04);
    }
    .face-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 44px; margin-bottom: 10px; }
    .face-preview { display: none; margin-top: 14px; text-align: center; }
    .face-preview img {
      max-height: 170px;
      border-radius: 8px;
      border: 2px solid var(--accent);
    }
    #face-search-btn {
      width: 100%;
      margin-top: 12px;
      padding: 16px;
      background: var(--accent2);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      display: none;
    }
    #face-search-btn:hover { background: #ff8555; }
    #face-search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* STATUS */
    .status-bar {
      max-width: 640px;
      margin: 10px auto 0;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      min-height: 20px;
    }
    .status-bar.loading { color: var(--accent); }
    .status-bar.success { color: var(--success); }
    .status-bar.error { color: #f87171; }

    .progress-wrap {
      max-width: 640px;
      margin: 6px auto 0;
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 0.3s;
    }
    .progress-wrap.active { display: block; }

    /* ============================
       RESULT VIEWER
       ============================ */
    #viewer-section {
      display: none;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .viewer-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .viewer-bib {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 4px;
      color: var(--accent);
      line-height: 1;
    }
    .viewer-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    .folder-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .folder-link-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* THUMBNAIL STRIP (main viewer) */
    .thumb-strip-wrap { position: relative; }
    .thumb-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 2px 10px;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .thumb-strip::-webkit-scrollbar { height: 4px; }
    .thumb-strip::-webkit-scrollbar-track { background: transparent; }
    .thumb-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .thumb-item {
      flex-shrink: 0;
      width: 110px;
      height: 76px;
      border-radius: 7px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.18s;
      background: var(--surface2);
      position: relative;
    }
    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb-item:hover { border-color: var(--muted); transform: scale(1.04); }
    .thumb-item.active { border-color: var(--accent); }
    /* zoom icon overlay */
    .thumb-item::after {
      content: '🔍';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      opacity: 0;
      transition: all 0.18s;
    }
    .thumb-item:hover::after { background: rgba(0,0,0,0.35); opacity: 1; }

    /* ============================
       LIGHTBOX POPUP
       ============================ */
    .lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.93);
      backdrop-filter: blur(14px);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 16px;
    }
    .lightbox.open { display: flex; }

    .lb-close {
      position: absolute; top: 18px; right: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 44px; height: 44px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      z-index: 10;
    }
    .lb-close:hover { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }

    .lb-main {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 92vw;
      max-height: 78vh;
      flex: 1;
    }
    .lb-img {
      max-width: 88vw;
      max-height: 76vh;
      border-radius: 10px;
      object-fit: contain;
      display: block;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transition: opacity 0.2s;
    }
    .lb-img.hidden { opacity: 0; }
    .lb-spinner {
      position: absolute;
      inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 13px;
    }

    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(10,10,15,0.75);
      border: 1px solid var(--border);
      color: var(--text);
      width: 50px; height: 50px;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      backdrop-filter: blur(6px);
      z-index: 5;
    }
    .lb-nav:hover { border-color: var(--accent); color: var(--accent); background: rgba(10,10,15,0.95); }
    #lb-prev { left: -64px; }
    #lb-next { right: -64px; }

    .lb-info {
      margin-top: 14px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .lb-bib-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--accent);
    }
    .lb-counter {
      font-size: 13px;
      color: var(--muted);
    }
    .lb-folder-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      transition: all 0.2s;
    }
    .lb-folder-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* LB THUMB STRIP */
    .lb-thumbs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 4px 2px 2px;
      max-width: 88vw;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      margin-top: 10px;
    }
    .lb-thumbs::-webkit-scrollbar { height: 3px; }
    .lb-thumb {
      flex-shrink: 0;
      width: 72px; height: 50px;
      border-radius: 5px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.16s;
      background: var(--surface2);
    }
    .lb-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .lb-thumb:hover { border-color: var(--muted); }
    .lb-thumb.active { border-color: var(--accent); }

    @media (max-width: 680px) {
      #lb-prev { left: 4px; }
      #lb-next { right: 4px; }
      .lb-img { max-height: 55vh; }
    }

    /* SECTION */
    .section {
      padding: 36px 24px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .count-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
    }

    /* PHOTO GRID (browse) */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
    }
    .photo-card {
      position: relative;
      aspect-ratio: 3/2;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: all 0.18s;
    }
    .photo-card:hover {
      transform: scale(1.03);
      border-color: var(--accent);
      box-shadow: 0 0 18px rgba(247,201,72,0.18);
      z-index: 2;
    }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; }
    .photo-card .bib-tag {
      position: absolute; bottom: 5px; left: 5px;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(4px);
      color: var(--accent);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 2px 7px;
      border-radius: 4px;
    }
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* PAGINATION */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    .page-btn {
      width: 38px; height: 38px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.18s;
      display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); color: #0a0a0f; border-color: var(--accent); font-weight: 700; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* EMPTY / NO RESULT */
    .empty-state {
      text-align: center;
      padding: 70px 24px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 52px; margin-bottom: 14px; }
    .empty-state h3 { font-size: 19px; margin-bottom: 8px; color: var(--text); }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 13px 18px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 3000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      max-width: 300px;
    }
    .toast.show { transform: none; opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: #f87171; color: #f87171; }

    @media (max-width: 600px) {
      .viewer-bib { font-size: 28px; }
      .thumb-item { width: 72px; height: 50px; }
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .bib-input { font-size: 22px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#">MARATHON<span>PHOTOS</span></a>
</header>

<!-- HERO -->
<div class="hero">
  <h1>TÌM ẢNH<br><em>CỦA BẠN</em></h1>
  <p>Nhập số BIB hoặc upload ảnh selfie để tìm khoảnh khắc của bạn trong giải marathon</p>

  <div class="search-container">
    <!-- TABS -->
    <div class="search-tabs">
      <button class="tab-btn active" id="tab-bib" onclick="switchTab('bib')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
        Tìm theo số BIB
      </button>
      <button class="tab-btn" id="tab-face" onclick="switchTab('face')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M20 21a8 8 0 1 0-16 0"/>
        </svg>
        Quét khuôn mặt để tìm ảnh
      </button>
    </div>

    <!-- BIB PANEL -->
    <div id="bib-search-panel">
      <div class="bib-search">
        <input class="bib-input" id="bib-input" type="text" inputmode="numeric"
               placeholder="044" maxlength="6"
               oninput="this.value=this.value.replace(/[^0-9]/g,'')"
               onkeydown="if(event.key==='Enter') searchByBib()">
        <button class="search-btn" onclick="searchByBib()">TÌM KIẾM</button>
      </div>
    </div>

    <!-- FACE PANEL -->
    <div id="face-search-panel">
      <div class="face-upload-area" id="face-drop"
           ondragover="event.preventDefault();this.classList.add('dragover')"
           ondragleave="this.classList.remove('dragover')"
           ondrop="handleFaceDrop(event)">
        <input type="file" accept="image/*" id="face-file" onchange="handleFaceFile(event)">
        <div class="upload-icon">🤳</div>
        <div style="font-weight:600;margin-bottom:6px;">Upload ảnh chân dung</div>
        <div style="color:var(--muted);font-size:13px;">Kéo thả hoặc click để chọn ảnh selfie / ảnh rõ mặt</div>
      </div>
      <div class="face-preview" id="face-preview">
        <img id="face-preview-img" src="" alt="preview">
      </div>
      <button id="face-search-btn" onclick="searchByFace()">🔍 TÌM THEO KHUÔN MẶT</button>
    </div>

    <div class="status-bar" id="status-bar"></div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
</div>

<!-- VIEWER SECTION (shown after search) -->
<div id="viewer-section">
  <div class="viewer-header">
    <div>
      <div id="viewer-bib" class="viewer-bib"></div>
      <div id="viewer-subtitle" class="viewer-subtitle"></div>
    </div>
    <div id="viewer-folder-links" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;"></div>
  </div>

  <!-- THUMBNAIL STRIP (click to open lightbox) -->
  <div class="thumb-strip-wrap">
    <div class="thumb-strip" id="thumb-strip"></div>
  </div>
</div>

<!-- LIGHTBOX POPUP -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>

  <div class="lb-main">
    <button class="lb-nav" id="lb-prev" onclick="lbNav(-1)">‹</button>
    <div style="position:relative;">
      <div class="lb-spinner" id="lb-spinner">Đang tải ảnh...</div>
      <img class="lb-img hidden" id="lb-img" src="" alt=""
           onload="onLbImgLoad()" onerror="onLbImgError()">
    </div>
    <button class="lb-nav" id="lb-next" onclick="lbNav(1)">›</button>
  </div>

  <div class="lb-info">
    <div class="lb-bib-label" id="lb-bib-label"></div>
    <div class="lb-counter" id="lb-counter"></div>
    <a class="lb-folder-btn" id="lb-folder-btn" href="#" target="_blank">📁 Mở thư mục Google Drive</a>
  </div>

  <div class="lb-thumbs" id="lb-thumbs"></div>
</div>

<!-- BROWSE SECTION (always visible, below search result) -->
<div class="section" id="browse-section">
  <div class="section-title">
    ẢNH MỚI NHẤT
    <span class="count-badge" id="total-count">--</span>
  </div>
  <div class="photo-grid" id="main-grid"></div>
  <div class="pagination" id="pagination"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================================================================
// ===  CONFIG — SỬA TẠI ĐÂY  =========================================
// =====================================================================
const CONFIG = {
  jsonUrl:        'https://raw.githubusercontent.com/tcr-challenge/phuchoa2026/main/photos.json',   // URL raw GitHub file photos.json
  folderTemplate: 'https://drive.google.com/drive/folders/1_z_YUXz1HzP8VEbjufSCeL6il8XEotdG',   // VD: https://drive.google.com/drive/folders/{BIB}
  prefixes:       ['M', 'F'],   // Tiền tố BIB
};
// =====================================================================

let PHOTOS = [];
let faceModelsLoaded = false;

// Browse grid state
let browsePage = 1;
const PAGE_SIZE = 24;

// Viewer state
let viewerList = [];
let viewerIndex = 0;

// =====================================================================
// INIT
// =====================================================================
document.addEventListener('DOMContentLoaded', () => {
  loadFaceModels();
  fetchPhotos();
});

// =====================================================================
// FETCH PHOTOS
// =====================================================================
async function fetchPhotos() {
  if (!CONFIG.jsonUrl) {
    loadDemoData();
    return;
  }
  setStatus('Đang tải danh sách ảnh...', 'loading');
  showProgress(20);
  try {
    const res = await fetch(CONFIG.jsonUrl + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    PHOTOS = await res.json();
    showProgress(100);
    document.getElementById('total-count').textContent = PHOTOS.length.toLocaleString();
    setStatus(`Đã tải ${PHOTOS.length.toLocaleString()} ảnh`, 'success');
    setTimeout(() => { setStatus(''); hideProgress(); }, 2000);
    browsePage = 1;
    renderBrowseGrid();
  } catch(e) {
    setStatus('Lỗi tải dữ liệu: ' + e.message, 'error');
    hideProgress();
    loadDemoData();
  }
}

function loadDemoData() {
  PHOTOS = Array.from({length: 48}, (_, i) => {
    const num = String(i + 1).padStart(3, '0');
    const prefix = i % 3 === 0 ? 'F' : 'M';
    const bib = prefix + num;
    return {
      id: 'demo_' + i,
      bib: bib,
      thumb: `https://picsum.photos/seed/${bib}/300/200`,
      full: `https://picsum.photos/seed/${bib}/900/600`,
      folderUrl: '',
      drive: 1
    };
  });
  document.getElementById('total-count').textContent = PHOTOS.length + ' (demo)';
  browsePage = 1;
  renderBrowseGrid();
}

// =====================================================================
// TABS
// =====================================================================
function switchTab(tab) {
  ['bib', 'face'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  document.getElementById('bib-search-panel').style.display = tab === 'bib' ? '' : 'none';
  document.getElementById('face-search-panel').style.display = tab === 'face' ? '' : 'none';
}

// =====================================================================
// BIB SEARCH
// =====================================================================
function searchByBib() {
  const raw = document.getElementById('bib-input').value.trim();
  if (!raw) { showToast('Vui lòng nhập số BIB', 'error'); return; }

  const digits = raw.replace(/[^0-9]/g, '');
  if (!digits) { showToast('Vui lòng nhập số BIB hợp lệ', 'error'); return; }

  // Luôn dùng 3 chữ số cuối, padStart về 3 chữ số
  const last3 = digits.slice(-3).padStart(3, '0');

  // Tìm theo tất cả prefix có trong CONFIG
  const searchBibs = CONFIG.prefixes.map(p => p.toUpperCase() + last3);

  setStatus(`Đang tìm BIB ${searchBibs.join(' / ')}...`, 'loading');

  const matches = PHOTOS.filter(p => {
    const pb = p.bib.toUpperCase();
    return searchBibs.some(bib => pb === bib);
  });

  if (matches.length === 0) {
    setStatus('', '');
    showViewer([], null, searchBibs.join(' / '));
    return;
  }

  setStatus(`✓ Tìm thấy ${matches.length} ảnh`, 'success');
  setTimeout(() => setStatus('', ''), 2500);
  showViewer(matches, 0, searchBibs.join(' / '));
}

// =====================================================================
// VIEWER + LIGHTBOX
// =====================================================================
function showViewer(list, startIdx, label) {
  viewerList = list;
  viewerIndex = startIdx !== null ? startIdx : 0;

  const section = document.getElementById('viewer-section');
  section.style.display = 'block';

  document.getElementById('viewer-bib').textContent = 'BIB ' + label;

  if (list.length === 0) {
    document.getElementById('viewer-subtitle').textContent = 'Không tìm thấy ảnh nào trong hệ thống';
    document.getElementById('thumb-strip').innerHTML = `
      <div style="color:var(--muted);padding:40px 0;font-size:14px;">
        BIB <strong style="color:var(--accent)">${label}</strong> chưa có ảnh trong hệ thống
      </div>`;
    document.getElementById('viewer-folder-links').innerHTML = '';
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }

  document.getElementById('viewer-subtitle').textContent = list.length + ' ảnh — click để xem lớn';

  // Folder links — lấy folderUrl trực tiếp từng ảnh trong photos.json
  const seen = new Set();
  const linksHtml = list
    .filter(p => { const url = p.folderUrl; if (!url || seen.has(url)) return false; seen.add(url); return true; })
    .slice(0, 4) // tối đa 4 link khác nhau
    .map(p => `<a class="folder-link-btn" href="${p.folderUrl}" target="_blank">📁 Thư mục ${p.bib}</a>`)
    .join('');
  document.getElementById('viewer-folder-links').innerHTML = linksHtml;

  // Build thumb strip
  buildThumbStrip(list);

  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function buildThumbStrip(list) {
  const strip = document.getElementById('thumb-strip');
  strip.innerHTML = list.map((photo, i) => `
    <div class="thumb-item" onclick="openLightbox(${i})" title="Ảnh ${i+1} — BIB ${photo.bib}">
      <img src="${photo.thumb}" alt="bib ${photo.bib}" loading="lazy"
           onerror="this.src='https://placehold.co/110x76/1c1c27/7070a0?text=?'">
    </div>
  `).join('');
}

// =====================================================================
// LIGHTBOX
// =====================================================================
function openLightbox(idx) {
  viewerIndex = idx;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderLightboxImage();
  buildLbThumbs();
  document.addEventListener('keydown', lbKeyHandler);
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  document.removeEventListener('keydown', lbKeyHandler);
}

function lbNav(dir) {
  viewerIndex = (viewerIndex + dir + viewerList.length) % viewerList.length;
  renderLightboxImage();
  syncLbThumbs();
}

function renderLightboxImage() {
  const photo = viewerList[viewerIndex];
  if (!photo) return;

  const img = document.getElementById('lb-img');
  const spinner = document.getElementById('lb-spinner');

  img.classList.add('hidden');
  spinner.style.display = 'flex';
  spinner.textContent = 'Đang tải ảnh...';

  // Dùng thumbnail size lớn hơn để hiển thị — Google Drive thumbnail API hỗ trợ sz=w1200
  // Nếu thumb url dùng sz=w300, đổi thành w1200 để chất lượng tốt hơn
  let displayUrl = photo.thumb;
  if (displayUrl && displayUrl.includes('drive.google.com/thumbnail')) {
    displayUrl = displayUrl.replace(/sz=w\d+/, 'sz=w1200');
  } else if (photo.full && !photo.full.includes('export=view')) {
    displayUrl = photo.full;
  }
  img.src = displayUrl;

  // BIB label
  document.getElementById('lb-bib-label').textContent = 'BIB ' + photo.bib;
  document.getElementById('lb-counter').textContent = (viewerIndex + 1) + ' / ' + viewerList.length;

  // Folder link — dùng folderUrl từ photo object
  const folderBtn = document.getElementById('lb-folder-btn');
  if (photo.folderUrl) {
    folderBtn.href = photo.folderUrl;
    folderBtn.style.display = '';
  } else {
    folderBtn.style.display = 'none';
  }
}

function onLbImgLoad() {
  document.getElementById('lb-img').classList.remove('hidden');
  document.getElementById('lb-spinner').style.display = 'none';
}
function onLbImgError() {
  document.getElementById('lb-spinner').textContent = 'Không thể tải ảnh này';
}

function buildLbThumbs() {
  const strip = document.getElementById('lb-thumbs');
  strip.innerHTML = viewerList.map((photo, i) => `
    <div class="lb-thumb ${i === viewerIndex ? 'active' : ''}" onclick="lbGoTo(${i})">
      <img src="${photo.thumb}" alt="" loading="lazy"
           onerror="this.src='https://placehold.co/72x50/1c1c27/7070a0?text=?'">
    </div>
  `).join('');
  syncLbThumbs();
}

function syncLbThumbs() {
  const thumbs = document.querySelectorAll('.lb-thumb');
  thumbs.forEach((el, i) => el.classList.toggle('active', i === viewerIndex));
  const active = thumbs[viewerIndex];
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function lbGoTo(idx) {
  viewerIndex = idx;
  renderLightboxImage();
  syncLbThumbs();
}

function lbKeyHandler(e) {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
}

// Click ngoài lightbox để đóng
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

// =====================================================================
// BROWSE GRID
// =====================================================================
function renderBrowseGrid() {
  const grid = document.getElementById('main-grid');
  const total = PHOTOS.length;
  const start = (browsePage - 1) * PAGE_SIZE;
  const page = PHOTOS.slice(start, start + PAGE_SIZE);

  if (total === 0) {
    grid.innerHTML = '<div style="color:var(--muted);text-align:center;padding:40px;">Chưa có dữ liệu ảnh</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  // Skeleton first
  grid.innerHTML = page.map(() => '<div class="photo-card skeleton" style="aspect-ratio:3/2;"></div>').join('');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const card = entry.target;
      if (card.dataset.loaded) return;
      card.dataset.loaded = '1';
      const photo = page[parseInt(card.dataset.idx)];
      if (!photo) return;
      card.classList.remove('skeleton');
      card.innerHTML = `
        <img src="${photo.thumb}" alt="bib ${photo.bib}"
             onerror="this.src='https://placehold.co/300x200/1c1c27/7070a0?text=?'">
        <div class="bib-tag">${photo.bib}</div>
      `;
      card.onclick = () => {
        // Set viewerList to all PHOTOS so lightbox can navigate the full set
        viewerList = PHOTOS;
        openLightbox(start + parseInt(card.dataset.idx));
      };
      observer.unobserve(card);
    });
  }, { rootMargin: '120px' });

  grid.innerHTML = page.map((_, i) => `<div class="photo-card skeleton" data-idx="${i}"></div>`).join('');
  grid.querySelectorAll('.photo-card').forEach(card => observer.observe(card));

  renderPagination(total);
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

  let html = `<button class="page-btn" ${browsePage===1?'disabled':''} onclick="goPage(${browsePage-1})">‹</button>`;
  const range = getPaginationRange(browsePage, totalPages);
  range.forEach(p => {
    if (p === '...') html += `<button class="page-btn" disabled>…</button>`;
    else html += `<button class="page-btn ${p===browsePage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  html += `<button class="page-btn" ${browsePage===totalPages?'disabled':''} onclick="goPage(${browsePage+1})">›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function getPaginationRange(cur, total) {
  if (total <= 7) return Array.from({length:total},(_,i)=>i+1);
  if (cur <= 4) return [1,2,3,4,5,'...',total];
  if (cur >= total-3) return [1,'...',total-4,total-3,total-2,total-1,total];
  return [1,'...',cur-1,cur,cur+1,'...',total];
}

function goPage(p) {
  browsePage = p;
  renderBrowseGrid();
  document.getElementById('browse-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// =====================================================================
// FACE RECOGNITION
// =====================================================================
async function loadFaceModels() {
  try {
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
    await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
    ]);
    faceModelsLoaded = true;
  } catch(e) {
    console.warn('Face models load failed:', e);
  }
}

function handleFaceFile(e) {
  const file = e.target.files[0];
  if (file) showFacePreview(file);
}
function handleFaceDrop(e) {
  e.preventDefault();
  document.getElementById('face-drop').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) showFacePreview(file);
}
function showFacePreview(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('face-preview-img').src = e.target.result;
    document.getElementById('face-preview').style.display = 'block';
    document.getElementById('face-search-btn').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function searchByFace() {
  if (!faceModelsLoaded) {
    setStatus('Đang tải model nhận diện... Vui lòng thử lại sau ít giây', 'loading');
    await loadFaceModels();
  }
  const btn = document.getElementById('face-search-btn');
  btn.disabled = true;
  setStatus('🤖 Đang phân tích khuôn mặt...', 'loading');
  showProgress(15);

  try {
    const img = document.getElementById('face-preview-img');
    const detection = await faceapi
      .detectSingleFace(img, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.4 }))
      .withFaceLandmarks()
      .withFaceDescriptor();

    showProgress(40);

    if (!detection) {
      setStatus('Không phát hiện khuôn mặt rõ ràng. Thử ảnh khác.', 'error');
      btn.disabled = false;
      hideProgress();
      return;
    }

    const queryDescriptor = detection.descriptor;
    setStatus('Đang so sánh với ' + PHOTOS.length + ' ảnh...', 'loading');
    showProgress(60);

    const photosWithFaces = PHOTOS.filter(p => p.faceDescriptor);
    let results = [];

    if (photosWithFaces.length > 0) {
      results = photosWithFaces
        .map(p => ({ photo: p, dist: faceapi.euclideanDistance(queryDescriptor, new Float32Array(p.faceDescriptor)) }))
        .filter(r => r.dist < 0.55)
        .sort((a, b) => a.dist - b.dist)
        .slice(0, 50)
        .map(r => r.photo);
    } else {
      // Fallback: scan first 200 thumbnails
      const batch = PHOTOS.slice(0, 200);
      let done = 0;
      for (const photo of batch) {
        try {
          const thumbImg = await loadImageFromUrl(photo.thumb);
          const det = await faceapi
            .detectSingleFace(thumbImg, new faceapi.TinyFaceDetectorOptions({ scoreThreshold: 0.4 }))
            .withFaceLandmarks()
            .withFaceDescriptor();
          if (det) {
            const dist = faceapi.euclideanDistance(queryDescriptor, det.descriptor);
            if (dist < 0.55) results.push({ photo, dist });
          }
        } catch(e) {}
        done++;
        showProgress(60 + Math.floor(done / batch.length * 35));
      }
      results = results.sort((a,b)=>a.dist-b.dist).slice(0,30).map(r=>r.photo);
    }

    showProgress(100);
    setTimeout(hideProgress, 1500);

    if (results.length === 0) {
      setStatus('Không tìm thấy ảnh phù hợp với khuôn mặt này', 'error');
    } else {
      setStatus(`✓ Tìm thấy ${results.length} ảnh có khuôn mặt khớp`, 'success');
      setTimeout(() => setStatus('', ''), 2500);
      showViewer(results, null, 'Kết quả khuôn mặt');
    }
  } catch(e) {
    setStatus('Lỗi nhận diện mặt: ' + e.message, 'error');
    hideProgress();
  }
  btn.disabled = false;
}

// =====================================================================
// UTILITIES
// =====================================================================
function setStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = 'status-bar' + (type ? ' ' + type : '');
}
function showProgress(pct) {
  document.getElementById('progress-wrap').classList.add('active');
  document.getElementById('progress-fill').style.width = pct + '%';
}
function hideProgress() {
  document.getElementById('progress-wrap').classList.remove('active');
  document.getElementById('progress-fill').style.width = '0%';
}
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.className = 'toast', 3000);
}
function loadImageFromUrl(url) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = url;
  });
}
